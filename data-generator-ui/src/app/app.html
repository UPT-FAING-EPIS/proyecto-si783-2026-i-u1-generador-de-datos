<div class="container">
  <h1>🚀 Data Generator Dinámico</h1>
  <p class="subtitle">Define tu propia estructura de tabla y genera datos personalizados</p>

  <div class="config-section">
    <h2>Configuración General</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre de la tabla</label>
        <input type="text" [(ngModel)]="tableName" placeholder="ej: clientes, productos, etc.">
      </div>
      <div class="form-group">
        <label>Número de registros</label>
        <input type="number" [(ngModel)]="recordCount" min="1" max="1000000">
      </div>
      <div class="form-group">
        <label>Formato de salida</label>
        <select [(ngModel)]="outputFormat">
          <option value="Sql">SQL (INSERTs)</option>
          <option value="Json">JSON</option>
          <option value="Csv">CSV</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de Base de Datos (para SQL)</label>
        <select [(ngModel)]="databaseType">
          <option value="MySQL">MySQL</option>
          <option value="PostgreSQL">PostgreSQL</option>
          <option value="MicrosoftSQLServer">SQL Server</option>
        </select>
      </div>
    </div>
  </div>

  <div class="columns-section">
    <h2>Definición de Columnas</h2>
    <button class="btn-add" (click)="addColumn()">+ Agregar Columna</button>
    
    <div class="columns-list">
      <div class="column-card" *ngFor="let col of columns; let i = index">
        <div class="card-header">
          <h3>Columna {{ i + 1 }}</h3>
          <button class="btn-remove" (click)="removeColumn(i)">✖</button>
        </div>
        
        <div class="form-group">
          <label>Nombre de la columna</label>
          <input type="text" [(ngModel)]="col.name" placeholder="ej: nombre, email, precio">
        </div>
        
        <div class="form-group">
  <label>Tipo de dato</label>
  <select [(ngModel)]="col.type" (change)="onTypeChange(col)">
    <!-- ===== TIPOS BÁSICOS ===== -->
    <optgroup label="🔢 Tipos Básicos">
      <option value="Integer">Número entero</option>
      <option value="Decimal">Número decimal</option>
      <option value="String">Texto</option>
      <option value="Boolean">Verdadero/Falso</option>
      <option value="DateTime">Fecha y hora</option>
      <option value="Date">Fecha</option>
      <option value="Time">Hora</option>
      <option value="Guid">Identificador GUID</option>
    </optgroup>
    
    <!-- ===== DATOS DE PERSONA ===== -->
    <optgroup label="👤 Persona">
      <option value="FullName">Nombre completo</option>
      <option value="FirstName">Nombre</option>
      <option value="LastName">Apellido</option>
      <option value="UserName">Nombre de usuario</option>
    </optgroup>
    
    <!-- ===== CONTACTO ===== -->
    <optgroup label="📞 Contacto">
      <option value="Email">Correo electrónico</option>
      <option value="Phone">Teléfono</option>
      <option value="CellPhone">Celular</option>
    </optgroup>
    
    <!-- ===== UBICACIÓN ===== -->
    <optgroup label="📍 Ubicación">
      <option value="City">Ciudad</option>
      <option value="Country">País</option>
      <option value="Address">Dirección</option>
      <option value="ZipCode">Código postal</option>
      <option value="Latitude">Latitud</option>
      <option value="Longitude">Longitud</option>
    </optgroup>
    
    <!-- ===== INTERNET ===== -->
    <optgroup label="🌐 Internet">
      <option value="IPv4">Dirección IPv4</option>
      <option value="IPv6">Dirección IPv6</option>
      <option value="Url">URL</option>
      <option value="DomainName">Nombre de dominio</option>
    </optgroup>
    
    <!-- ===== FINANZAS ===== -->
    <optgroup label="💰 Finanzas">
      <option value="CreditCardNumber">Número de tarjeta</option>
      <option value="Amount">Monto/Cantidad</option>
      <option value="Currency">Moneda</option>
      <option value="IBAN">IBAN</option>
    </optgroup>
    
    <!-- ===== EMPRESA ===== -->
    <optgroup label="🏢 Empresa">
      <option value="CompanyName">Nombre de empresa</option>
      <option value="JobTitle">Puesto de trabajo</option>
      <option value="Department">Departamento</option>
    </optgroup>
    
    <!-- ===== PRODUCTO ===== -->
    <optgroup label="📦 Producto">
      <option value="ProductName">Nombre de producto</option>
      <option value="ProductDescription">Descripción</option>
      <option value="Price">Precio</option>
      <option value="SKU">Código SKU</option>
    </optgroup>
    
    <!-- ===== TEXTO ===== -->
    <optgroup label="📝 Texto">
      <option value="Text">Texto largo</option>
      <option value="Paragraph">Párrafo</option>
      <option value="Sentence">Oración</option>
      <option value="Word">Palabra</option>
    </optgroup>
    
    <!-- ===== IDENTIFICADORES ===== -->
    <optgroup label="🆔 Identificadores">
      <option value="UUID">UUID</option>
      <option value="Cuit">CUIT (Argentina)</option>
      <option value="Rfc">RFC (México)</option>
      <option value="Dni">DNI</option>
    </optgroup>
    
    <!-- ===== OTROS ===== -->
    <optgroup label="🎨 Otros">
      <option value="Color">Color</option>
      <option value="ImageUrl">URL de imagen</option>
      <option value="Enum">Selección (Lista)</option>
      <option value="Json">JSON</option>
    </optgroup>
  </select>
</div>
        
        <!-- Campos adicionales según el tipo -->
        <div *ngIf="col.type === 'Integer' || col.type === 'Decimal'" class="row-2">
          <div class="form-group">
            <label>Valor mínimo</label>
            <input type="number" [(ngModel)]="col.minValue">
          </div>
          <div class="form-group">
            <label>Valor máximo</label>
            <input type="number" [(ngModel)]="col.maxValue">
          </div>
        </div>
        
        <div *ngIf="col.type === 'String'" class="form-group">
          <label>Longitud máxima</label>
          <input type="number" [(ngModel)]="col.maxLength" placeholder="ej: 50">
        </div>
        
        <div *ngIf="col.type === 'Enum'" class="form-group">
          <label>Valores posibles (separados por coma)</label>
          <input type="text" [(ngModel)]="col.possibleValuesText" placeholder="ej: Activo,Inactivo,Pendiente">
        </div>
        
        <div class="row-2">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="col.isNullable">
            Permitir valores nulos
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-generate" (click)="generate()" [disabled]="isGenerating || columns.length === 0">
      {{ isGenerating ? 'Generando...' : 'Generar y Descargar' }}
    </button>
  </div>

  <div *ngIf="message" [class]="messageType">
    {{ message }}
  </div>
</div>
